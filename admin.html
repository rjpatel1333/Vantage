<!DOCTYPE html>
<html>
<head>
    <title>Vantage Logistics — Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        h2 { color: #007bff; text-align: center; }
        .subtitle { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #007bff; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        tr:hover { background: #2a2a2a; }
        #refresh-status { text-align: center; color: #aaa; font-size: 0.8rem; margin-top: 15px; }
        .gps-link { color: #28a745; text-decoration: none; }
        .no-gps { color: #666; }
    </style>
</head>
<body>
    <h2>Vantage Logistics — Admin Dashboard</h2>
    <p class="subtitle">Live driver logs — auto refreshes every 30 seconds</p>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Driver</th>
                <th>Status</th>
                <th>Location</th>
            </tr>
        </thead>
        <tbody id="list">
            <tr><td colspan="4" style="color:#aaa;">Loading...</td></tr>
        </tbody>
    </table>
    <div id="refresh-status">Loading...</div>
    <script>
        var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwZnpjcmJ1Y21zZGJ2YW5ocXlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzE0MDUsImV4cCI6MjA5MjA0NzQwNX0.N1V1jayIDYk30D31xw17FMK-kmFWHqa6MP-bojVBsag';
        var APIURL = 'https://dpfzcrbucmsdbvanhqyo.supabase.co/rest/v1/global_logs?select=*&order=created_at.desc';

        function getData() {
            fetch(APIURL, {
                headers: {
                    'apikey': KEY,
                    'Authorization': 'Bearer ' + KEY
                }
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var html = '';
                if (!data || data.length === 0) {
                    html = '<tr><td colspan="4" style="color:#aaa;">No logs yet</td></tr>';
                } else {
                    for (var i = 0; i < data.length; i++) {
                        var row = data[i];
                        var time = new Date(row.created_at).toLocaleString();
                        var driver = row.user_name || 'Anonymous';
                        var status = row.status_message || '-';
                        var location = '<span class="no-gps">No GPS</span>';

                        var lat = parseFloat(row.latitude);
                        var lon = parseFloat(row.longitude);

                        if (row.street_address) {
                            var mapsUrl = 'https://www.google.com/maps?q=' + lat + ',' + lon;
                            location = '<a class="gps-link" href="' + mapsUrl + '" target="_blank">📍 ' + row.street_address + '</a>';
                        } else if (!isNaN(lat) && !isNaN(lon)) {
                            var mapsUrl = 'https://www.google.com/maps?q=' + lat + ',' + lon;
                            location = '<a class="gps-link" href="' + mapsUrl + '" target="_blank">📍 ' + lat.toFixed(4) + ', ' + lon.toFixed(4) + '</a>';
                        }

                        html += '<tr>' +
                            '<td>' + time + '</td>' +
                            '<td>' + driver + '</td>' +
                            '<td>' + status + '</td>' +
                            '<td>' + location + '</td>' +
                        '</tr>';
                    }
                }
                document.getElementById('list').innerHTML = html;
                document.getElementById('refresh-status').innerText = 'Last updated: ' + new Date().toLocaleTimeString() + ' — ' + data.length + ' logs total';
            })
            .catch(function(e) {
                document.getElementById('list').innerHTML = '<tr><td colspan="4" style="color:red;">Error: ' + e.message + '</td></tr>';
                document.getElementById('refresh-status').innerText = 'Failed to load';
            });
        }

        getData();
        setInterval(getData, 30000);
    </script>
</body>
</html>
