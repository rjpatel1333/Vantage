<!DOCTYPE html>
<html>
<head><title>Vantage Admin</title></head>
<body style="font-family:sans-serif; padding:20px; background:#f0f2f5;">
    <div style="max-width:800px; margin:auto; background:white; padding:20px; border-radius:10px; shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <h2>🚛 Vantage Logistics Dashboard</h2>
        <button onclick="getData()" style="padding:10px 20px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer;">🔄 Refresh Data</button>
        <table border="1" style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead style="background:#007bff; color:white;">
                <tr><th style="padding:10px;">Time</th><th style="padding:10px;">Driver</th><th style="padding:10px;">Status</th></tr>
            </thead>
            <tbody id="list" style="text-align:center;"></tbody>
        </table>
    </div>

    <script>
        const URL = 'https://dpfzcrbucmsdbvanhqyo.supabase.co/rest/v1/global_logs?select=*&order=created_at.desc';
        const KEY = 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv';

        async function getData() {
            try {
                const res = await fetch(URL, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
                const data = await res.json();
                let html = '';
                data.forEach(row => {
                    // Changed row.driver to row.name to match your database
                    html += `<tr style="border-bottom: 1px solid #ddd;">
                        <td style="padding:10px;">${new Date(row.created_at).toLocaleTimeString()}</td>
                        <td style="padding:10px;"><strong>${row.name || 'Anonymous'}</strong></td>
                        <td style="padding:10px;">${row.status_message || '-'}</td>
                    </tr>`;
                });
                document.getElementById('list').innerHTML = html;
            } catch (e) { console.error(e); }
        }
        getData();
        setInterval(getData, 30000); // Auto-refresh every 30s
    </script>
</body>
</html>
