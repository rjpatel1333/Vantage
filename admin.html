<script>
    const SUPABASE_URL = 'https://dpfzcrbucmsdbvanhqyo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv';

    async function loadLogs() {
        try {
            // The "t=" part at the end forces a fresh refresh every time
            const freshUrl = `${SUPABASE_URL}/rest/v1/global_logs?select=*&order=created_at.desc&limit=50&t=${new Date().getTime()}`;
            
            const res = await fetch(freshUrl, {
                headers: { 
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            const data = await res.json();
            const body = document.getElementById('logBody');
            body.innerHTML = ''; 

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="4" style="text-align:center;">No logs found.</td></tr>';
                return;
            }

            data.forEach(log => {
                const row = `<tr>
                    <td>${new Date(log.created_at).toLocaleString()}</td>
                    <td>${log.name || 'Unknown'}</td>
                    <td>${log.status_message || 'No Status'}</td>
                    <td>${log.address || 'Location not captured'}</td>
                </tr>`;
                body.innerHTML += row;
            });
        } catch (error) {
            console.error(error);
            document.getElementById('logBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Connection Error. Check Internet.</td></tr>';
        }
    }

    // Load once when page opens
    loadLogs();

    // Auto-refresh every 30 seconds just in case you forget to click
    setInterval(loadLogs, 30000);
</script>
