<!DOCTYPE html>
<html>
<head><title>Admin</title></head>
<body style="font-family:sans-serif; padding:20px;">
    <h2>Vantage Logs</h2>
    <button onclick="getData()" style="padding:10px; margin-bottom:10px;">🔄 Refresh</button>
    <table border="1" style="width:100%; border-collapse:collapse;">
        <thead><tr><th>Time</th><th>Driver</th><th>Status</th></tr></thead>
        <tbody id="list"></tbody>
    </table>

    <script>
        const URL = 'https://dpfzcrbucmsdbvanhqyo.supabase.co/rest/v1/global_logs?select=*&order=created_at.desc';
        const KEY = 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv';

        async function getData() {
            try {
                const res = await fetch(URL, {
                    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
                });
                const data = await res.json();
                let html = '';
                data.forEach(row => {
                    html += `<tr><td>${new Date(row.created_at).toLocaleTimeString()}</td><td>${row.name}</td><td>${row.status_message}</td></tr>`;
                });
                document.getElementById('list').innerHTML = html;
            } catch (e) { alert('Error: ' + e); }
        }
        getData();
    </script>
</body>
</html>
