<!DOCTYPE html>
<html>
<head>
    <title>Vantage Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        table { width: 100%; max-width: 900px; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #007bff; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn-refresh { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <h2 style="color: #333;">Vantage Logistics - Operations Log</h2>
    <button class="btn-refresh" onclick="location.reload()">🔄 Refresh Logs</button>

    <table id="logTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Driver</th>
                <th>Status</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody id="logBody">
            <tr><td colspan="4" style="text-align:center;">Loading logs...</td></tr>
        </tbody>
    </table>

    <script>
        const SUPABASE_URL = 'https://dpfzcrbucmsdbvanhqyo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv';

        async function loadLogs() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/global_logs?select=*&order=created_at.desc&limit=50`, {
                    headers: { 
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await res.json();
                const body = document.getElementById('logBody');
                body.innerHTML = ''; 

                if (data.length === 0) {
                    body.innerHTML = '<tr><td colspan="4" style="text-align:center;">No logs found yet.</td></tr>';
                    return;
                }

                data.forEach(log => {
                    const row = `<tr>
                        <td>${new Date(log.created_at).toLocaleString()}</td>
                        <td>${log.name || 'Unknown'}</td>
                        <td>${log.status_message || 'No Status'}</td>
                        <td>${log.address || 'Location not captured'}</td>
                    </tr>`;
                    body.innerHTML += row;
                });
            } catch (error) {
                document.getElementById('logBody').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error connecting to database.</td></tr>';
            }
        }
        loadLogs();
    </script>
</body>
</html>
