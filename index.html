<!DOCTYPE html>
<html>
<head>
    <title>Vantage Driver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f4; }
        input { padding: 15px; width: 80%; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { padding: 20px; width: 90%; margin: 10px 0; border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .start { background: #28a745; }
        .stop { background: #dc3545; }
        #statusMsg { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Vantage Driver Log</h2>
    
    <input type="text" id="driverName" placeholder="Enter Your Name">
    
    <button class="start" onclick="sendData('Start Shift')">START SHIFT</button>
    <button class="stop" onclick="sendData('End Shift')">END SHIFT</button>

    <div id="statusMsg">Ready</div>

    <script>
        const SUPABASE_URL = 'https://dpfzcrbucmsdbvanhqyo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv';

        async function sendData(status) {
            const nameInput = document.getElementById('driverName').value;
            const statusMsg = document.getElementById('statusMsg');
            
            // If the box is empty, it will default to "Raj" so it's never "Unknown"
            const finalName = nameInput.trim() !== "" ? nameInput : "Raj";

            statusMsg.innerText = "⏳ Logging...";

            const payload = {
                name: finalName,
                status_message: status,
                address: "Melbourne/Albury Route" // Simple placeholder for now
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/global_logs`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusMsg.innerText = `✅ ${status} Logged for ${finalName}`;
                    statusMsg.style.color = "#28a745";
                } else {
                    statusMsg.innerText = "❌ Error: Could not log";
                }
            } catch (err) {
                statusMsg.innerText = "❌ Connection Error";
            }
        }
    </script>
</body>
</html>
