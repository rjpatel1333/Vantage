<!DOCTYPE html>
<html>
<head><title>Vantage App</title><meta name="viewport" content="width=device-width, initial-scale=1"></head>
<body style="text-align:center; padding:30px; font-family:sans-serif; background:#f4f4f4;">
    <h2>Vantage Driver Log</h2>
    <input type="text" id="user" placeholder="Enter Name" style="padding:15px; width:80%; margin-bottom:20px; border-radius:8px; border:1px solid #ccc;">
    <button onclick="send('Start Shift')" style="background:#28a745; color:white; padding:20px; width:90%; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">START SHIFT</button>
    <button onclick="send('End Shift')" style="background:#dc3545; color:white; padding:20px; width:90%; border:none; border-radius:8px; font-weight:bold;">END SHIFT</button>
    <p id="msg" style="font-weight:bold; margin-top:20px;"></p>

    <script>
        async function send(status) {
            const name = document.getElementById('user').value || 'Rajesh';
            const msg = document.getElementById('msg');
            msg.innerText = '⏳ Sending...';
            msg.style.color = 'black';

            try {
                const res = await fetch('https://dpfzcrbucmsdbvanhqyo.supabase.co/rest/v1/global_logs', {
                    method: 'POST',
                    headers: { 
                        'apikey': 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv',
                        'Authorization': 'Bearer sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv',
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    // "name" and "status_message" must match the database exactly
                    body: JSON.stringify({ name: name, status_message: status })
                });
                
                if(res.ok) {
                    msg.innerText = '✅ Logged Successfully!';
                    msg.style.color = 'green';
                } else {
                    msg.innerText = '❌ Database Error';
                }
            } catch(e) { 
                msg.innerText = '❌ Connection Error'; 
            }
        }
    </script>
</body>
</html>
