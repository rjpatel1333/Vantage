<!DOCTYPE html>
<html>
<head><title>Vantage App</title></head>
<body style="text-align:center; padding:50px; font-family:sans-serif;">
    <h2>Vantage Driver App</h2>
    <button onclick="send('Start')" style="background:green; color:white; padding:20px; width:100%; margin-bottom:10px;">START SHIFT</button>
    <button onclick="send('Stop')" style="background:red; color:white; padding:20px; width:100%;">END SHIFT</button>
    <p id="msg"></p>

    <script>
        async function send(status) {
            document.getElementById('msg').innerText = 'Sending...';
            try {
                const res = await fetch('https://dpfzcrbucmsdbvanhqyo.supabase.co/rest/v1/global_logs', {
                    method: 'POST',
                    headers: { 
                        'apikey': 'sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv',
                        'Authorization': 'Bearer sb_publishable_XHY4j2vx-A3TMQc5rEUlkQ_nVjGC3Yv',
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ name: 'Raj', status_message: status })
                });
                if(res.ok) document.getElementById('msg').innerText = '✅ Success!';
            } catch(e) { document.getElementById('msg').innerText = '❌ Failed'; }
        }
    </script>
</body>
</html>
